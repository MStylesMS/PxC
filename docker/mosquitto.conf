# Mosquitto MQTT Broker Configuration for Houdini Clock

# General settings
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener for browser clients
listener 9001 0.0.0.0
protocol websockets

# Allow anonymous connections (adjust for production security)
allow_anonymous true

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
connection_messages true
log_timestamp true

# Security settings (uncomment for production)
# password_file /mosquitto/config/pwfile
# acl_file /mosquitto/config/aclfile

# Client settings
max_inflight_messages 20
max_queued_messages 1000

# Topic restrictions (optional - uncomment to restrict topics)
# topic readwrite Paradox/Houdini/Mirror/Clock/Commands

# WebSocket settings
websockets_log_level 255
