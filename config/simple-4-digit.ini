[type]
style = simple-4-digit
mode = countdown

[mqtt]
; Leave host empty so the clock auto-connects to its page's origin host at runtime.
; Set explicitly (e.g. host = myserver.local) only when the MQTT broker is on a
; different machine from the web server.
host =
port = 1884
topic = paradox/agent22/clock

[display]
orientation = 0
fade_background_type = color
fade_background_color = #b3e0ff
fade_duration_ms = 600

[led]
time_font = CursedTimer
hint_font = TypewriterBold
background_color = #b3e0ff
text_color = #111111
