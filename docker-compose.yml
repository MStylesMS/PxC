version: '3.8'

services:
  # Houdini Clock Application
  houdini-clock:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_MQTT_HOST: ${MQTT_HOST:-mqtt-broker}
        REACT_APP_MQTT_PORT: ${MQTT_PORT:-1883}
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - mqtt-broker
    restart: unless-stopped
    networks:
      - escape-room-network

  # MQTT Broker (Eclipse Mosquitto)
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - escape-room-network

  # Redis for session storage (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - escape-room-network
    command: redis-server --appendonly yes

  # Nginx Reverse Proxy (production)
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - houdini-clock
    restart: unless-stopped
    networks:
      - escape-room-network
    profiles:
      - production

volumes:
  mqtt-data:
  mqtt-logs:
  redis-data:

networks:
  escape-room-network:
    driver: bridge
